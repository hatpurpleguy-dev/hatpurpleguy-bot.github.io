<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASTRO-DASH</title>
    <style>
        body { margin: 0; background: #12121a; color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-x: hidden; }
        .page-layout { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 800px; }
        
        /* Game Window Styles - Zoomed out to be more compact */
        #canvasContainer { 
            position: relative; 
            width: 100%; 
            max-width: 800px; 
            aspect-ratio: 16/9; 
            background: #05050f; 
            border: 4px solid #1a1c23; 
            border-radius: 8px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.8), 0 0 20px rgba(72, 224, 255, 0.1); 
            overflow: hidden; 
            cursor: pointer; 
        }
        canvas { display: block; image-rendering: pixelated; width: 100%; height: 100%; object-fit: contain; }
        #overlay { position: absolute; top: 20px; left: 30px; color: #48e0ff; pointer-events: none; font-size: clamp(16px, 2vw, 24px); font-weight: bold; text-shadow: 0 0 10px #48e0ff; z-index: 10; }
        
        .game-title { margin: 0; font-size: 28px; color: #48e0ff; text-shadow: 0 0 10px rgba(72, 224, 255, 0.5); }

        .controls-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: center; }

        /* Leaderboard section (always on page) */
        .lb-section {
            background: #12121a;
            border: 2px solid #1a1c23;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), 0 0 20px rgba(72,224,255,0.08);
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .lb-section h2 {
            margin: 0 0 16px 0;
            color: #48e0ff;
            text-align: center;
            text-shadow: 0 0 10px rgba(72,224,255,0.5);
            font-size: 22px;
            letter-spacing: 2px;
        }
        .podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            min-height: 150px;
        }
        .podium-place {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
        }
        .podium-medal { font-size: 24px; margin-bottom: 4px; }
        .podium-name { font-size: 13px; color: #e2e8f0; max-width: 95px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .podium-score { font-size: 12px; color: #fde047; margin-bottom: 6px; }
        .podium-bar {
            width: 100%;
            border-radius: 6px 6px 0 0;
        }
        .podium-1 .podium-bar { height: 90px; background: linear-gradient(180deg,#fde047,#ca8a04); }
        .podium-2 .podium-bar { height: 65px; background: linear-gradient(180deg,#e2e8f0,#94a3b8); }
        .podium-3 .podium-bar { height: 45px; background: linear-gradient(180deg,#fb923c,#9a3412); }

        .lb-list {
            overflow-y: auto;
            max-height: 280px;
            border-top: 1px solid #1a1c23;
            padding-top: 8px;
            scrollbar-width: thin;
            scrollbar-color: #48e0ff #1a1c23;
        }
        .lb-list::-webkit-scrollbar { width: 8px; }
        .lb-list::-webkit-scrollbar-track { background: #1a1c23; border-radius: 4px; }
        .lb-list::-webkit-scrollbar-thumb { background: #48e0ff; border-radius: 4px; }
        .lb-list::-webkit-scrollbar-thumb:hover { background: #7ce8ff; }
        .lb-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            font-size: 13px;
            color: #94a3b8;
            border-radius: 4px;
        }
        .lb-row:nth-child(odd) { background: rgba(255,255,255,0.03); }
        .lb-rank { width: 34px; color: #48e0ff; }
        .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 8px; }
        .lb-score { color: #fde047; }
        .lb-empty { text-align: center; color: #475569; padding: 20px 0; font-size: 13px; }

        /* Name entry overlay (after game over) */
        .name-entry {
            position: fixed;
            inset: 0;
            background: rgba(5,5,15,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        .name-entry.visible { display: flex; }
        .name-entry-box {
            background: #12121a;
            border: 2px solid #1a1c23;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 0 40px rgba(72,224,255,0.15);
        }
        .name-entry-box p { color: #48e0ff; margin: 0 0 4px; font-size: 14px; letter-spacing: 1px; }
        .name-entry-box .ne-score { color: #fde047; font-size: 30px; font-weight: bold; margin-bottom: 16px; text-shadow: 0 0 10px rgba(253,224,71,0.5); }
        .name-entry-box input {
            width: 100%;
            box-sizing: border-box;
            background: #05050f;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .name-entry-box input:focus { outline: none; border-color: #48e0ff; }
        .name-entry-box button {
            background: #48e0ff;
            color: #05050f;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        .name-entry-box button:hover { background: #7ce8ff; }
    </style>
</head>
<body>

<div class="page-layout" style="padding-top:0;">
    <a href="#" id="supportLink" style="color:#fde047; font-size:15px; text-decoration:none; border:1px solid rgba(253,224,71,0.4); padding:8px 16px; border-radius:20px; background:rgba(253,224,71,0.05);">Click here to support me🤗❤️, its as simple as watching an ad</a>
</div>

<script>
    // 👉 PASTE YOUR MONETAG DIRECT LINKS HERE — as many as you want.
    const directLinks = [
        "https://omg10.com/4/11189259",
        "https://omg10.com/4/11189262",
        "https://omg10.com/4/11189267"
    ];

    document.getElementById('supportLink').addEventListener('click', function(e) {
        e.preventDefault();
        const randomLink = directLinks[Math.floor(Math.random() * directLinks.length)];
        window.open(randomLink, '_blank');
    });
</script>

<div class="page-layout">
    <h1 class="game-title">ASTRO-DASH</h1>

    <div id="canvasContainer">
        <div id="overlay">SCORE: 0</div>
        <canvas id="game" width="960" height="540"></canvas>
    </div>

    <div class="controls-row">
        <p style="color: #666; font-size: 14px; margin: 0;">Controls: Click / Tap / Space to Thrust</p>
    </div>

    <!-- Leaderboard section, always visible -->
    <div class="lb-section">
        <h2>TOP PILOTS</h2>
        <div class="podium" id="podiumEl"></div>
        <div class="lb-list" id="lbListEl"></div>
    </div>
</div>

<!-- Name Entry Overlay -->
<div class="name-entry" id="nameEntry">
    <div class="name-entry-box">
        <p>NEW LEADERBOARD SCORE!</p>
        <div class="ne-score" id="neScore">0</div>
        <input type="text" id="nameInput" maxlength="12" placeholder="ENTER YOUR NAME">
        <br>
        <button id="submitScoreBtn">SAVE SCORE</button>
    </div>
</div>

<!-- Load Tone.js for Sound Effects -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    
    const WIDTH = 960;
    const HEIGHT = 540;
    
    let state = 'start'; 
    let score = 0;
    let shipY = HEIGHT / 2;
    let shipVY = 0;
    let shipAngle = 0;
    const GRAVITY = 0.45;
    const THRUST = -9.5;
    
    let asteroids = [];
    let stars = [];
    let particles = [];
    let shake = 0;
    let flashAlpha = 0;
    let shockwaves = [];
    let audioCtxStarted = false;
    let explosionSynth, thrustSynth;

    function initAudio() {
        if (!audioCtxStarted && typeof Tone !== 'undefined') {
            Tone.start();
            audioCtxStarted = true;
            const explosionDistortion = new Tone.Distortion(0.8).toDestination();
            const explosionFilter = new Tone.Filter(800, "lowpass").connect(explosionDistortion);
            explosionSynth = new Tone.NoiseSynth({ noise: { type: 'brown' }, envelope: { attack: 0.01, decay: 1.5, sustain: 0, release: 0.2 }, volume: -5 }).connect(explosionFilter);
            thrustSynth = new Tone.Synth({ oscillator: { type: 'square' }, envelope: { attack: 0.01, decay: 0.15, sustain: 0, release: 0.1 } }).toDestination();
            thrustSynth.volume.value = -14;
        }
    }

    function createPixelSprite(data, colorMap, scale = 4) {
        const size = data.length;
        const off = document.createElement('canvas');
        off.width = size * scale;
        off.height = size * scale;
        const octx = off.getContext('2d');
        for (let r = 0; r < size; r++) {
            for (let c = 0; c < data[r].length; c++) {
                const char = data[r][c];
                if (char === '.') continue;
                octx.fillStyle = colorMap[char];
                octx.fillRect(c * scale, r * scale, scale, scale);
            }
        }
        return off;
    }

    const shipSprite = createPixelSprite([
        "........OO......",
        ".......OLLO.....",
        "......OLLLLO....",
        ".....OLLLLLLO.OO",
        "....OLLLLLLLOODO",
        "OO.OLLLLLLLLODDO",
        "ODOOLLBBBBLLODDO",
        "ODDOLLBBBBLLODDO",
        "ODDOLLLLLLLLODDO",
        "OO.OLLLLLLLLODDO",
        "....OLLLLLLLOODO",
        ".....OLLLLLLO.OO",
        "......OLLLLO....",
        ".......OLLO.....",
        "........OO......",
        "................"
    ], { O: '#1a1c23', L: '#e2e8f0', D: '#64748b', B: '#06b6d4', E: '#f97316' });

    const astSprites = [
        createPixelSprite([".....OOOOOO.....", "...OOLLLLLLOO...", "..OLLLLLLMMMMO..", ".OLMMLMMMMMMMMO.", ".OLMLCCOMMMMMMO.", "OLLMOCCOOMMMMMMO", "OLLMMCOMMMMBBMBO", "OLLLMMMMMMBCCBBO", "OLLMMMMMMMBCCBBO", "OLLMMBBMMMMBBBBO", ".OMMBCCBMMMBBBO.", ".OMMBCCBMMBBMMO.", "..OMMBBMMMBBMO..", "...OOMMMBBBBO...", ".....OOOOOO....."], { O: '#111111', B: '#475569', M: '#64748b', L: '#94a3b8', C: '#334155' }),
        createPixelSprite(["......OOOO......", "....OOLLLLOO....", "...OLLLLMMMMO...", "..OLLMMMMMMMBO..", ".OLLMMBCCBMMBBO.", ".OLMMMBCCBMMBBO.", "OLLMMMMBBMMMMBBO", "OLLMMMMMMMMMMBBO", "OLMMMCCOMMMMMMBO", "OLMMCCOOMMMMMMBO", ".OMMMCOMMMMMMBO.", ".OMMBBMMMMMMBBO.", "..OMMMMMMMMBBO..", "...OOMMBBBBOO...", "....OOOOOOOO...."], { O: '#111111', B: '#475569', M: '#64748b', L: '#94a3b8', C: '#334155' })
    ];

    for(let i = 0; i < 150; i++) {
        stars.push({ x: Math.random() * WIDTH, y: Math.random() * HEIGHT, size: Math.random() < 0.9 ? 2 : 3, speed: Math.random() * 2.5 + 0.5, color: Math.random() < 0.8 ? '#ffffff' : (Math.random() < 0.5 ? '#93c5fd' : '#fde047') });
    }

    function spawnParticles(x, y, color, count, speed, life) {
        for(let i=0; i<count; i++) {
            particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * speed, vy: (Math.random() - 0.5) * speed, color: color, life: life, maxLife: life, size: Math.random() * 5 + 3 });
        }
    }

    /* ---------------- LEADERBOARD (localStorage, no server) ---------------- */

    const LB_KEY = 'astroDashLeaderboard';
    const MAX_ENTRIES = 50;
    let scoreSubmitted = false;

    function loadLeaderboard() {
        try {
            const raw = localStorage.getItem(LB_KEY);
            return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
    }

    function saveLeaderboardData(list) {
        try { localStorage.setItem(LB_KEY, JSON.stringify(list)); } catch (e) {}
    }

    function qualifiesForLeaderboard(s) {
        if (s <= 0) return false;
        const lb = loadLeaderboard();
        if (lb.length < MAX_ENTRIES) return true;
        return s > lb[lb.length - 1].score;
    }

    function addScoreToLeaderboard(name, s) {
        let lb = loadLeaderboard();
        const clean = (name || '').trim().substring(0, 12).toUpperCase() || 'ANON';
        lb.push({ name: clean, score: s });
        lb.sort((a, b) => b.score - a.score);
        lb = lb.slice(0, MAX_ENTRIES);
        saveLeaderboardData(lb);
        return lb;
    }

    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    const medalEmojis = ['🥇', '🥈', '🥉'];

    function renderLeaderboard() {
        const lb = loadLeaderboard();
        const podiumEl = document.getElementById('podiumEl');
        const listEl = document.getElementById('lbListEl');

        podiumEl.innerHTML = '';
        if (lb.length === 0) {
            podiumEl.style.display = 'none';
        } else {
            podiumEl.style.display = 'flex';
            const order = [1, 0, 2]; // visual order: 2nd, 1st, 3rd
            order.forEach(idx => {
                const entry = lb[idx];
                const place = document.createElement('div');
                place.className = 'podium-place podium-' + (idx + 1);
                const name = entry ? escapeHtml(entry.name) : '—';
                const sc = entry ? entry.score : '—';
                place.innerHTML =
                    '<div class="podium-medal">' + medalEmojis[idx] + '</div>' +
                    '<div class="podium-name">' + name + '</div>' +
                    '<div class="podium-score">' + sc + '</div>' +
                    '<div class="podium-bar"></div>';
                podiumEl.appendChild(place);
            });
        }

        listEl.innerHTML = '';
        if (lb.length <= 3) {
            listEl.innerHTML = '<div class="lb-empty">Play to fill the rest of the top 50!</div>';
            return;
        }
        for (let i = 3; i < lb.length; i++) {
            const row = document.createElement('div');
            row.className = 'lb-row';
            row.innerHTML =
                '<span class="lb-rank">#' + (i + 1) + '</span>' +
                '<span class="lb-name">' + escapeHtml(lb[i].name) + '</span>' +
                '<span class="lb-score">' + lb[i].score + '</span>';
            listEl.appendChild(row);
        }
    }

    function isOverlayOpen() {
        return document.getElementById('nameEntry').classList.contains('visible');
    }

    function showNameEntry() {
        document.getElementById('neScore').innerText = score;
        const overlay = document.getElementById('nameEntry');
        overlay.classList.add('visible');
        const input = document.getElementById('nameInput');
        input.value = '';
        setTimeout(() => input.focus(), 50);
    }
    function hideNameEntry() {
        document.getElementById('nameEntry').classList.remove('visible');
    }
    function submitScore() {
        if (scoreSubmitted) return;
        const input = document.getElementById('nameInput');
        addScoreToLeaderboard(input.value, score);
        scoreSubmitted = true;
        hideNameEntry();
        renderLeaderboard();
    }

    document.getElementById('submitScoreBtn').addEventListener('click', submitScore);
    document.getElementById('nameInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); submitScore(); }
        e.stopPropagation();
    });

    /* ------------------------------------------------------------------ */

    function update() {
        stars.forEach(s => { s.x -= s.speed + (state === 'playing' ? (score * 0.05) : 0); if (s.x < 0) { s.x = WIDTH; s.y = Math.random() * HEIGHT; } });
        for(let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.1; if(p.life <= 0) particles.splice(i, 1); }
        for(let i = shockwaves.length - 1; i >= 0; i--) { let sw = shockwaves[i]; sw.radius += sw.speed; sw.alpha -= 0.03; if(sw.alpha <= 0) shockwaves.splice(i, 1); }
        if (flashAlpha > 0) flashAlpha -= 0.03;
        if (shake > 0) shake *= 0.85;

        if (state === 'playing') {
            shipVY += GRAVITY; shipY += shipVY;
            let targetAngle = Math.max(-0.6, Math.min(0.6, shipVY * 0.06));
            shipAngle += (targetAngle - shipAngle) * 0.15;
            if (shipY < -30 || shipY > HEIGHT + 30) triggerGameOver();

            if (Math.random() < 0.035) asteroids.push({ x: WIDTH + 80, y: Math.random() * HEIGHT, spriteIdx: Math.floor(Math.random() * astSprites.length), size: 50 + Math.random() * 55, rot: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.06 });
            asteroids.forEach((a, i) => {
                a.x -= 7 + (score * 0.08); a.y += (shipY - a.y) * 0.0025; a.rot += a.rotSpeed;
                if (Math.hypot((WIDTH * 0.25) - a.x, shipY - a.y) < (a.size * 0.35) + 12) triggerGameOver();
                if (a.x < -100) { asteroids.splice(i, 1); score++; if (score % 5 === 0) shake = 5; }
            });
        }
    }

    function triggerGameOver() {
        state = 'gameover'; shake = 35; flashAlpha = 0.8;
        if (audioCtxStarted && explosionSynth) explosionSynth.triggerAttackRelease("2n");
        spawnParticles(WIDTH * 0.25, shipY, '#f97316', 50, 12, 4);
        shockwaves.push({ x: WIDTH * 0.25, y: shipY, radius: 10, speed: 8, alpha: 1, color: '#fde047' });
        scoreSubmitted = false;
        if (qualifiesForLeaderboard(score)) {
            setTimeout(showNameEntry, 900);
        }
    }

    function draw() {
        ctx.save();
        if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
        ctx.fillStyle = '#05050f'; ctx.fillRect(0, 0, WIDTH, HEIGHT);
        stars.forEach(s => { ctx.fillStyle = s.color; ctx.fillRect(s.x, s.y, s.size, s.size); });
        particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life / p.maxLife); ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size); ctx.globalAlpha = 1; });
        shockwaves.forEach(sw => { ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2); ctx.strokeStyle = sw.color; ctx.globalAlpha = Math.max(0, sw.alpha); ctx.lineWidth = 6; ctx.stroke(); ctx.globalAlpha = 1; });
        
        if (state !== 'gameover') { ctx.save(); ctx.translate(WIDTH * 0.25, shipY); ctx.rotate(shipAngle); ctx.drawImage(shipSprite, -32, -32, 64, 64); ctx.restore(); }
        asteroids.forEach(a => { ctx.save(); ctx.translate(a.x, a.y); ctx.rotate(a.rot); ctx.drawImage(astSprites[a.spriteIdx], -a.size/2, -a.size/2, a.size, a.size); ctx.restore(); });
        ctx.restore();
        if (flashAlpha > 0) { ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`; ctx.fillRect(0, 0, WIDTH, HEIGHT); }
        overlay.innerText = "SCORE: " + score;
        if (state !== 'playing') { ctx.fillStyle = 'rgba(5, 5, 15, 0.7)'; ctx.fillRect(0,0,WIDTH,HEIGHT); ctx.fillStyle = '#48e0ff'; ctx.font = 'bold 42px Courier New'; ctx.textAlign = 'center'; ctx.fillText(state === 'start' ? "ASTRO-DASH" : "GAME OVER", WIDTH/2, HEIGHT/2 - 30); ctx.font = 'bold 24px Courier New'; ctx.fillStyle = '#e2e8f0'; ctx.fillText(state === 'start' ? "TAP TO START" : "FINAL SCORE: " + score, WIDTH/2, HEIGHT/2 + 30); }
    }

    function triggerAction() {
        if (isOverlayOpen()) return;
        initAudio();
        if (state === 'playing') {
            shipVY = THRUST;
            if (audioCtxStarted && thrustSynth) { thrustSynth.triggerAttackRelease("G2", "16n"); thrustSynth.frequency.exponentialRampToValueAtTime("G4", Tone.now() + 0.1); }
            spawnParticles(WIDTH * 0.25 - 35, shipY, '#e2e8f0', 8, 4, 1.5);
        } else { state = 'playing'; score = 0; asteroids = []; particles = []; shockwaves = []; flashAlpha = 0; shipY = HEIGHT / 2; shipVY = 0; shipAngle = 0; shake = 0; }
    }

    canvas.addEventListener('mousedown', triggerAction);
    window.addEventListener('keydown', (e) => {
        if (isOverlayOpen()) return;
        if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); triggerAction(); }
    });
    function loop() { update(); draw(); requestAnimationFrame(loop); }
    renderLeaderboard();
    loop();
</script>
</body>
</html>
